_format_version: "3.0"

services:
  - name: websocket-service
    url: http://websocket:3002
    routes:
      - name: websocket-route
        paths:
          - /websocket
        protocols: [http, https]
        strip_path: true
        regex_priority: 1
        plugins:
          - name: jwt
            config:
              run_on_preflight: false
              header_names: []
              uri_param_names: [token] 
              key_claim_name: iss

  - name: graphql-service
    url: http://graphql:3003/graphql
    routes:
      - name: graphql-route
        paths: [/graphql]
        strip_path: false
        regex_priority: 1
        plugins:
          - name: jwt
            config:
              run_on_preflight: false
              header_names: [Authorization]
              key_claim_name: iss

  - name: rest-api
    url: http://rest:3000
    routes:
      - name: public-routes
        paths: [/users]
        methods: [POST, OPTIONS]
        strip_path: false
        regex_priority: 1

      - name: protected-routes
        paths: [/]
        strip_path: false
        regex_priority: 0
        plugins:
          - name: jwt
            config:
              run_on_preflight: false
              header_names: [Authorization]
              key_claim_name: iss

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
      headers:
        [
          "Accept",
          "Authorization",
          "Content-Type",
          "Origin",
          "X-Requested-With",
        ]
      preflight_continue: false

consumers:
  - username: mess-app
    jwt_secrets:
      - key: "issuer-identifier"
        secret: "SECRET_KEY"
